[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short -n auto --reruns 2 --reruns-delay 2 --timeout 300 --cov=core --cov=engine --cov=infra --cov-report=html --cov-report=xml --alluredir=reports/allure-results

# Markers
markers =
    smoke: Smoke tests (core functionality, fast verification)
    regression: Regression tests (full functionality verification)
    slow: Slow tests (>10 seconds)
    ui: UI tests
    unit: Unit tests
    integration: Integration tests

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S
